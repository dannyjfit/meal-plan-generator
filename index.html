<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ultimate Performer — Meal Plan Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Montserrat:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#f0eee7;
  --steel:#4682b4;
  --steel-dark:#2d5a8e;
  --steel-light:rgba(70,130,180,0.1);
  --dark:#1a1a1a;
  --mid:#555;
  --light:#888;
  --border:#d8d5ce;
  --white:#ffffff;
}

html,body{background:var(--cream);font-family:'Montserrat',sans-serif;color:var(--dark);min-height:100vh;overflow-x:hidden}
.wrap{max-width:720px;margin:0 auto;padding:40px 24px 80px}

.hdr{text-align:center;margin-bottom:48px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--steel);margin-bottom:12px}
.hdr h1{font-family:'DM Serif Display',serif;font-size:clamp(26px,5vw,38px);line-height:1.15;margin-bottom:12px}
.hdr p{font-size:14px;color:var(--mid);line-height:1.6;max-width:460px;margin:0 auto}

.step-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--steel);margin-bottom:14px}
.step-block{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:28px;margin-bottom:16px}
.step-q{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:18px;color:var(--dark)}

.opt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.opt-btn{background:transparent;border:1.5px solid var(--border);border-radius:3px;padding:14px 12px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;color:var(--dark);cursor:pointer;transition:all .15s ease;text-align:center;line-height:1.3}
.opt-btn:hover{border-color:var(--steel);color:var(--steel);background:var(--steel-light)}
.opt-btn.sel{border-color:var(--steel);background:var(--steel);color:var(--white)}

.btn-generate{width:100%;padding:16px;background:var(--dark);color:var(--white);border:none;border-radius:3px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .15s ease;margin-top:8px}
.btn-generate:hover{background:#333}
.btn-generate:disabled{background:var(--border);color:var(--light);cursor:not-allowed}

/* PLAN SCREEN */
.plan-screen{display:none}
.plan-screen.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.plan-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.meta-tag{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:var(--steel-light);color:var(--steel);padding:5px 12px;border-radius:2px}

.macro-bar{background:var(--dark);color:var(--white);border-radius:4px;padding:20px 24px;margin-bottom:24px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.macro-item{text-align:center}
.macro-val{font-family:'DM Serif Display',serif;font-size:28px;color:var(--white)}
.macro-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:2px}



/* DAY TABS */
.day-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.day-tab{padding:9px 18px;background:transparent;border:1.5px solid var(--border);border-radius:3px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--light);cursor:pointer;transition:all .15s ease}
.day-tab:hover{border-color:var(--steel);color:var(--steel)}
.day-tab.active{border-color:var(--steel);background:var(--steel);color:var(--white)}

.day-plan{display:none}
.day-plan.active{display:block;animation:fadeUp .25s ease}

/* MEAL CARD */
.meal-card{background:var(--white);border:1px solid var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden}
.meal-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.meal-type{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--steel)}
.meal-cals{font-size:12px;font-weight:700;color:var(--light)}
.meal-body{padding:16px 20px}
.meal-name{font-family:'DM Serif Display',serif;font-size:18px;color:var(--dark);margin-bottom:8px}
.meal-macros{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.meal-macro{font-size:11px;font-weight:700;color:var(--light);letter-spacing:.04em}
.meal-macro span{color:var(--dark)}
.ingredients{list-style:none;margin-bottom:12px}
.ingredients li{font-size:13px;color:var(--mid);padding:3px 0;border-bottom:1px solid #f5f3ee;line-height:1.5}
.ingredients li:last-child{border-bottom:none}
.ingredients li strong{color:var(--dark);font-weight:600}
.cook-note{font-size:13px;color:var(--mid);background:#f7f6f2;padding:10px 14px;border-radius:3px;margin-top:10px;line-height:1.6}
.cook-note .cook-heading{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--steel);margin-bottom:4px}

.reset-row{margin-top:32px;text-align:center}
.btn-reset{background:transparent;border:1.5px solid var(--border);color:var(--light);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:11px 24px;border-radius:3px;cursor:pointer;transition:all .15s ease}
.btn-reset:hover{border-color:var(--dark);color:var(--dark)}

@media(max-width:480px){
  .wrap{padding:24px 16px 60px}
  .opt-grid{grid-template-columns:1fr 1fr}
  .step-block{padding:20px}
  .macro-bar{gap:16px}
  .macro-val{font-size:22px}
}
</style>
</head>
<body>
<div class="wrap">

<!-- SELECTOR -->
<div id="selectorScreen">
  <div class="hdr">
    <div class="eyebrow">The Ultimate Performer</div>
    <h1>Your 5-Day<br><em>Meal Plan</em></h1>
    <p>Pick your calorie target and dietary preference — your personalised plan is ready instantly.</p>
  </div>

  <div class="step-block">
    <div class="step-label">Step 1 of 2</div>
    <div class="step-q">What's your daily calorie target?</div>
    <div class="opt-grid">
      <button class="opt-btn" data-group="cals" data-val="1400" onclick="pick(this)">1400 kcal</button>
      <button class="opt-btn" data-group="cals" data-val="1600" onclick="pick(this)">1600 kcal</button>
      <button class="opt-btn" data-group="cals" data-val="1800" onclick="pick(this)">1800 kcal</button>
      <button class="opt-btn" data-group="cals" data-val="2000" onclick="pick(this)">2000 kcal</button>
      <button class="opt-btn" data-group="cals" data-val="2200" onclick="pick(this)">2200 kcal</button>
      <button class="opt-btn" data-group="cals" data-val="2400" onclick="pick(this)">2400 kcal</button>
      <button class="opt-btn" data-group="cals" data-val="2600" onclick="pick(this)">2600 kcal</button>
    </div>
  </div>

  <div class="step-block">
    <div class="step-label">Step 2 of 2</div>
    <div class="step-q">Dietary preference?</div>
    <div class="opt-grid">
      <button class="opt-btn" data-group="diet" data-val="meat" onclick="pick(this)">🥩 Meat & Fish</button>
      <button class="opt-btn" data-group="diet" data-val="veggie" onclick="pick(this)">🥦 Vegetarian</button>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" disabled onclick="generatePlan()">Build My Meal Plan →</button>
</div>

<!-- PLAN -->
<div class="plan-screen" id="planScreen">
  <div class="hdr">
    <div class="eyebrow">Your Meal Plan</div>
    <h1>5-Day Plan Ready</h1>
    <p id="planSubtitle"></p>
  </div>
  <div class="plan-meta" id="planMeta"></div>
  <div class="macro-bar" id="macroBars"></div>



  <div class="day-tabs" id="dayTabs"></div>
  <div id="dayPlans"></div>
  <div class="reset-row"><button class="btn-reset" onclick="resetPlan()">← Change My Inputs</button></div>
</div>

</div>

<script>
const sel = {cals: null, diet: null};

function pick(btn) {
  const g = btn.dataset.group;
  document.querySelectorAll(`.opt-btn[data-group="${g}"]`).forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  sel[g] = btn.dataset.val;
  document.getElementById('generateBtn').disabled = !(sel.cals && sel.diet);
}

// ─── MACRO TARGETS ────────────────────────────────────────────
const MACROS = {
  1400: {p:140,c:105,f:47}, 1600: {p:160,c:120,f:53},
  1800: {p:180,c:135,f:60}, 2000: {p:200,c:150,f:67},
  2200: {p:210,c:165,f:73}, 2400: {p:220,c:180,f:80},
  2600: {p:240,c:195,f:87}
};
const VEGGIE_MACROS = {
  1400: {p:105,c:140,f:47}, 1600: {p:120,c:160,f:53},
  1800: {p:135,c:180,f:60}, 2000: {p:150,c:200,f:67},
  2200: {p:160,c:220,f:73}, 2400: {p:170,c:240,f:80},
  2600: {p:175,c:260,f:87}
};

function generatePlan() {
  const {cals, diet} = sel;
  const key = `${diet}_${cals}`;
  const plan = PLANS[key];
  if (!plan) { alert('Plan not found.'); return; }

  const macros = diet === 'veggie' ? VEGGIE_MACROS[parseInt(cals)] : MACROS[parseInt(cals)];
  const dietLabel = diet === 'meat' ? 'Meat & Fish' : 'Vegetarian';

  document.getElementById('planSubtitle').textContent = `${cals} kcal/day · ${dietLabel} · 40/30/30 macros`;

  const metaEl = document.getElementById('planMeta');
  metaEl.innerHTML = [cals + ' kcal', dietLabel, 'High Protein', '5 Days'].map(t => `<span class="meta-tag">${t}</span>`).join('');

  document.getElementById('macroBars').innerHTML = `
    <div class="macro-item"><div class="macro-val">${macros.p}g</div><div class="macro-lbl">Protein</div></div>
    <div class="macro-item"><div class="macro-val">${macros.c}g</div><div class="macro-lbl">Carbs</div></div>
    <div class="macro-item"><div class="macro-val">${macros.f}g</div><div class="macro-lbl">Fat</div></div>
    <div class="macro-item"><div class="macro-val">${cals}</div><div class="macro-lbl">Calories</div></div>
  `;

  const tabsEl = document.getElementById('dayTabs');
  const plansEl = document.getElementById('dayPlans');
  tabsEl.innerHTML = ''; plansEl.innerHTML = '';

  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  plan.forEach((day, i) => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (i === 0 ? ' active' : '');
    tab.textContent = days[i];
    tab.onclick = () => switchDay(i);
    tabsEl.appendChild(tab);

    const dp = document.createElement('div');
    dp.className = 'day-plan' + (i === 0 ? ' active' : '');
    dp.id = `day${i}`;
    dp.innerHTML = buildDayHTML(day);
    plansEl.appendChild(dp);
  });

  document.getElementById('selectorScreen').style.display = 'none';
  const ps = document.getElementById('planScreen');
  ps.style.display = 'block';
  ps.classList.add('active');

  window.scrollTo(0, 0);
  setTimeout(reportHeight, 200);
}

function buildDayHTML(day) {
  const meals = [
    {key:'breakfast', label:'Breakfast', emoji:'🌅'},
    {key:'lunch', label:'Lunch', emoji:'☀️'},
    {key:'dinner', label:'Dinner', emoji:'🌙'},
    {key:'snack', label:'Snack', emoji:'🍎'}
  ];
  return meals.map(m => {
    const meal = day[m.key];
    const isSnack = m.key === 'snack';
    const cookSection = isSnack ? '' : `<div class="cook-note"><div class="cook-heading">How to make it</div>${meal.method}</div>`;
    return `<div class="meal-card">
      <div class="meal-hdr">
        <span class="meal-type">${m.emoji} ${m.label}</span>
        <span class="meal-cals">${meal.cals} kcal</span>
      </div>
      <div class="meal-body">
        <div class="meal-name">${meal.name}</div>
        <div class="meal-macros">
          <div class="meal-macro">Protein <span>${meal.p}g</span></div>
          <div class="meal-macro">Carbs <span>${meal.c}g</span></div>
          <div class="meal-macro">Fat <span>${meal.f}g</span></div>
        </div>
        <ul class="ingredients">
          ${meal.ingredients.map(ing => `<li><strong>${ing.item}</strong> — ${ing.amount}</li>`).join('')}
        </ul>
        ${cookSection}
      </div>
    </div>`;
  }).join('');
}
function switchDay(i) {
  document.querySelectorAll('.day-tab').forEach((t, j) => t.classList.toggle('active', j === i));
  document.querySelectorAll('.day-plan').forEach((d, j) => d.classList.toggle('active', j === i));
  window.scrollTo(0, 0);
  setTimeout(reportHeight, 100);
}

function resetPlan() {
  document.getElementById('planScreen').style.display = 'none';
  document.getElementById('planScreen').classList.remove('active');
  document.getElementById('selectorScreen').style.display = 'block';
  window.scrollTo(0, 0);
  setTimeout(reportHeight, 200);
}

function reportHeight() {
  const h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: 'setHeight', height: h }, '*');
}
setTimeout(reportHeight, 300);
new MutationObserver(reportHeight).observe(document.body, { childList: true, subtree: true });
window.addEventListener('resize', reportHeight);
</script>
